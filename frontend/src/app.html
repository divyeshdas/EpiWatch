<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the theme before first paint to avoid a flash of the wrong
      // theme. Mirrors the logic in src/lib/stores/theme.ts: a stored
      // preference (set by the manual toggle) always wins; otherwise default
      // to light during the day and dark in the evening.
      (function () {
        try {
          var stored = localStorage.getItem('epiwatch-theme');
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.dataset.theme = stored;
          } else {
            var hour = new Date().getHours();
            document.documentElement.dataset.theme = (hour >= 6 && hour < 18) ? 'light' : 'dark';
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
